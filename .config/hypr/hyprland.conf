$MOD=SUPER

$MONITOR_1=DP-1
$MONITOR_2=HDMI-A-1

$LOCKSCRIPT="/home/ross/.local/bin/lock.sh"
$MENU="/home/ross/.config/rofi/scripts/launcher.sh"
$POWERMENU="/home/ross/.config/waybar/modules/poweroff.sh"
$CLIPBOARD="/home/ross/.config/rofi/scripts/clipboard.sh"
$SLEEP='swaymsg "output * dpms off"' resume 'swaymsg "output * dpms on"'
$STEAM_GAME=^(steam_app_[0-9]*)$

$ACTIVE_COL=rgb(64727d)
$INACTIVE_COL=rgb(212b30)
$ACTIVE_GROUP=rgb(1794d2)
$INACTIVE_GROUP=$INACTIVE_COL

monitor=$MONITOR_1,1920x1080@144,1080x580,1,bitdepth,10
monitor=$MONITOR_2,1920x1080@75,0x0,1,bitdepth,10
monitor=$MONITOR_2,transform,1

exec-once=hyprpaper
exec-once=/usr/lib/xdg-desktop-portal &
exec-once=/usr/lib/xdg-desktop-portal-hyprland &
exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once=systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once=swayidle -w timeout 300 $LOCKSCRIPT timeout 600 $SLEEP before-sleep $LOCKSCRIPT
exec-once=wl-paste --type text --watch cliphist store
exec-once=wl-paste --type image --watch cliphist store
exec-once="/home/ross/.local/bin/autostart_waybar"
exec-once=swayosd
exec-once=emacsclient -c -a=""
exec-once=alacritty
exec-once=firefox
exec-once=flatpak run com.discordapp.Discord
exec-once=steam

input {
    kb_file=
    kb_layout=us
    kb_variant=
    kb_model=
    kb_options=ctrl:nocaps
    kb_rules=

    follow_mouse=1

    touchpad {
        natural_scroll=no
    }

    sensitivity=0 # -1.0 - 1.0, 0 means no modification.
}

general {
    gaps_in=5
    gaps_out=5
    border_size=2
    col.active_border=$ACTIVE_COL
    col.inactive_border=$INACTIVE_COL

    apply_sens_to_raw=0 # whether to apply the sensitivity to raw input (e.g. used by games where you aim using your mouse)

    layout="dwindle"
}

plugin {
    hyprbars {
        bar_height=24
        bar_text_font=Iosevka Nerd Font
        bar_text_size=13
    }
}

decoration {
    rounding=14
    blur=1
    blur_size=3 # minimum 1
    blur_passes=6 # minimum 1
    blur_new_optimizations=1
    blur_ignore_opacity=0
    multisample_edges=4
    active_opacity=0.9
    inactive_opacity=0.8
    fullscreen_opacity=1.0
    shadow_range=10
    shadow_render_power=3
    col.shadow=0x990f0f0f
}

animations {
    enabled=1
    animation=windows,1,7,default
    animation=border,1,10,default
    animation=fade,1,10,default
    animation=workspaces,1,6,default

    bezier=linear,0,0,1,1

    bezier=easeInSine,0.12,0,0.39,0
    bezier=easeOutSine,0.61,1,0.88,1
    bezier=easeInOutSine,0.37,0,0.63,1

    bezier=easeInQuad,0.11,0,0.5,0
    bezier=easeOutQuad,0.5,1,0.89,1
    bezier=easeInOutQuad,0.45,0,0.55,1

    bezier=easeInCubic,0.32,0,0.67,0
    bezier=easeOutCubic,0.33,1,0.68,1
    bezier=easeInOutCubic,0.65,0,0.35,1

    bezier=easeInQuart,0.5,0,0.75,0
    bezier=easeOutQuart,0.25,1,0.5,1
    bezier=easeInOutQuart,0.76,0,0.24,1

    bezier=easeInQuint,0.64,0,0.78,0
    bezier=easeOutQuint,0.22,1,0.36,1
    bezier=easeInOutQuint,0.83,0,0.17,1

    bezier=easeInExpo,0.7,0,0.84,0
    bezier=easeOutExpo,0.16,1,0.3,1
    bezier=easeInOutExpo,0.87,0,0.13,1

    bezier=easeInCirc,0.55,0,1,0.45
    bezier=easeOutCirc,0,0.55,0.45,1
    bezier=easeInOutCirc,0.85,0,0.15,1

    bezier=easeInBack,0.36,0,0.66,-0.56
    bezier=easeOutBack,0.34,1.56,0.64,1
    bezier=easeInOutBack,0.68,-0.6,0.32,1.6

    # window creation
    animation=windowsIn,1,1,easeInCirc,popin 90%
    animation=fadeIn,1,1,easeOutCirc
    # window destruction
    animation=windowsOut,1,1,easeInCirc,popin 30%
    animation=fadeOut,1,1,easeOutCirc
    # window movement
    animation=windowsMove,1,3,easeOutBack,popin
}

binds {
    workspace_back_and_forth=1
}

dwindle {
    pseudotile=1
    preserve_split=1
    force_split=1
}

master {
    new_is_master=0
    new_on_top=1
    no_gaps_when_only=1
    orientation=left
}

gestures {
    workspace_swipe=no
}

misc {
    mouse_move_enables_dpms=true
    #no_vfr=false
}

# window rules
windowrule=tile,^(*)$
windowrule=float,Rofi
windowrule=pin,Rofi
windowrule=center,Rofi

windowrule=noblur,firefox
windowrule=opaque,firefox

windowrule=noblur,mpv
windowrule=opaque,mpv
windowrule=noblur,vlc
windowrule=opaque,vlc

windowrule=workspace 1 silent,emacs
windowrule=workspace 2 silent,Alacritty
windowrule=workspace 3 silent,firefox
windowrule=workspace 4 silent,discord
windowrule=workspace 5 silent,Spotify
windowrule=workspace 6 silent,Steam
windowrule=workspace 6 silent,lutris
windowrulev2=workspace 7 silent,class:$STEAM_GAME

windowrulev2=noblur,class:$STEAM_GAME
windowrulev2=opaque,class:$STEAM_GAME
windowrulev2=center,class:$STEAM_GAME
windowrulev2=fullscreen,class:$STEAM_GAME
windowrulev2=monitor $MONITOR_1,class:$STEAM_GAME

wsbind=7,$MONITOR_1

# some nice mouse binds
bindm=$MOD,mouse:272,movewindow
bindm=$MOD,mouse:273,resizewindow

# keybinds
bindr=$MOD,d,exec,pkill rofi || $MENU
bindr=$MOD,ESCAPE,exec,pkill rofi || $POWERMENU

bind=$MOD,RETURN,exec,alacritty
bind=$MODSHIFT,e,exec,emacsclient -c -a=""
bind=$MODSHIFT,c,exec,hyprctl reload && notify-send "Reloaded Hyprland"
bind=$MOD,f,fullscreen
bind=$MODSHIFT,q,killactive,
bind=$MODSHIFT,m,exit,
bind=$MOD,y,togglefloating,
bind=$MOD,p,pseudo,
bind=$MOD,v,exec,$CLIPBOARD
bind=$MODSHIFT,b,pin

bind=,Print,exec,"/home/ross/.local/bin/screenshot.sh"
bind=SHIFT,Print,exec,"/home/ross/.local/bin/screenshot.sh" "/home/ross/Pictures/screenshots"
bind=$MOD,C,exec,"/home/ross/.local/bin/toggle_sink.sh"
bind=,XF86AudioMute,exec,pactl set-sink-mute @DEFAULT_SINK@ toggle && "/home/ross/.local/bin/check_mute.sh" "getspeaker"
bind=,XF86AudioMicMute,exec,pactl set-source-mute @DEFAULT_SOURCE@ toggle && "/home/ross/.local/bin/check_mute.sh" "getmic"
bind=,XF86AudioNext,exec,playerctl next
bind=,XF86AudioPrev,exec,playerctl previous
bind=,XF86AudioPlay,exec,playerctl play-pause
bind=,XF86AudioStop,exec,playerctl stop

binde=$MOD,left,movefocus,l
binde=$MOD,h,movefocus,l
binde=$MOD,right,movefocus,r
binde=$MOD,l,movefocus,r
binde=$MOD,up,movefocus,u
binde=$MOD,k,movefocus,u
binde=$MOD,down,movefocus,d
binde=$MOD,j,movefocus,d

binde=,XF86MonBrightnessUp,exec,xbacklight -inc 10
binde=,XF86MonBrightnessDown,exec,xbacklight -dec 10
binde=,XF86AudioRaiseVolume,exec,pactl set-sink-volume @DEFAULT_SINK@ +5%
binde=,XF86AudioLowerVolume,exec,pactl set-sink-volume @DEFAULT_SINK@ -5%

binde=$MODSHIFT,h,movewindow,l
binde=$MODSHIFT,left,movewindow,l
binde=$MODSHIFT,l,movewindow,r
binde=$MODSHIFT,right,movewindow,r
binde=$MODSHIFT,k,movewindow,u
binde=$MODSHIFT,up,movewindow,u
binde=$MODSHIFT,j,movewindow,d
binde=$MODSHIFT,down,movewindow,d

binde=$MODCTRL,h,resizeactive,-25 0
binde=$MODCTRL,l,resizeactive,25 0
binde=$MODCTRL,k,resizeactive,0 -25
binde=$MODCTRL,j,resizeactive,0 25

bind=$MODSHIFT,o,movecurrentworkspacetomonitor,$MONITOR_2
bind=$MODSHIFT,p,movecurrentworkspacetomonitor,$MONITOR_1
bind=$MOD,1,workspace,1
bind=$MOD,2,workspace,2
bind=$MOD,3,workspace,3
bind=$MOD,4,workspace,4
bind=$MOD,5,workspace,5
bind=$MOD,6,workspace,6
bind=$MOD,7,workspace,7
bind=$MOD,8,workspace,8
bind=$MOD,9,workspace,9
bind=$MOD,0,workspace,10

bind=$MODSHIFT,1,movetoworkspace,1
bind=$MODSHIFT,2,movetoworkspace,2
bind=$MODSHIFT,3,movetoworkspace,3
bind=$MODSHIFT,4,movetoworkspace,4
bind=$MODSHIFT,5,movetoworkspace,5
bind=$MODSHIFT,6,movetoworkspace,6
bind=$MODSHIFT,7,movetoworkspace,7
bind=$MODSHIFT,8,movetoworkspace,8
bind=$MODSHIFT,9,movetoworkspace,9
bind=$MODSHIFT,0,movetoworkspace,10
bind=$MOD,mouse_down,workspace,e+1
bind=$MOD,mouse_up,workspace,e-1

bind=$MOD,g,togglegroup
bind=$MODSHIFT,g,changegroupactive,f
bind=$MODCTL,g,changegroupactive,g
