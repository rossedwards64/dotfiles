# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

format = "$directory$all $character"

# Wait 10 milliseconds for starship to check files under the current directory.
scan_timeout = 30

# Disable the blank line at the start of the prompt
add_newline = false

continuation_prompt = ">> "

[line_break]
disabled = true

[jobs]
number_threshold = 1

[os]
disabled = true

[os.symbols]
Arch = "¾░Żć "
Gentoo = "¾░Ż© "

[shell]
disabled = true

# Replace the "ŌØ»" symbol in the prompt with "Ō×£"
[character] # The name of the module we are configuring is "character"
success_symbol = "[Ō×£](bold green) " # The "success_symbol" segment is being set to "Ō×£" with the color "bold green"
error_symbol = "[Ō×£](bold red) "

[battery]
full_symbol = "­¤öŗ "
charging_symbol = "­¤öī "
discharging_symbol = "ŌÜĪ "

[[battery.display]]
threshold = 30
style = "bold red"

[cmake]
format = '\[[$symbol($version)]($style)\]'

[cmd_duration]
format = '\[[ŌÅ▒ $duration]($style)\]'
min_time = 5

